# Inventory file untuk 3 Host Kali Linux di VirtualBox (Vagrant / Manual VM)
# Untuk menggunakan ini, ubah baris `inventory = ./inventory/hosts.ini` menjadi `./inventory/hosts.vagrant.ini` di ansible.cfg

[control_node]
localhost ansible_connection=local

[webservers]
kali-web-1 ansible_host=192.168.56.11
kali-web-2 ansible_host=192.168.56.12

[dbservers]
kali-db-1 ansible_host=192.168.56.13

[managed_nodes:children]
webservers
dbservers

[managed_nodes:vars]
# ==============================================================================
# OPSI A: Jika menggunakan Vagrant otomatis (vagrant up)
# ==============================================================================
ansible_user=vagrant
ansible_ssh_private_key_file=~/.vagrant.d/insecure_private_key
ansible_python_interpreter=/usr/bin/python3

# ==============================================================================
# OPSI B: Jika Anda membuat VM Kali Linux secara manual di VirtualBox
# (Silakan uncomment baris di bawah ini dan comment Opsi A di atas)
# ==============================================================================
# ansible_user=kali
# ansible_password=kali
# ansible_python_interpreter=/usr/bin/python3
# ansible_ssh_common_args='-o StrictHostKeyChecking=no'
