---
- name: Pastikan direktori konfigurasi Nginx ada
  file:
    path: /opt/nginx_conf
    state: directory
    mode: "0755"

- name: Salin file konfigurasi Nginx (Reverse Proxy)
  template:
    src: default.conf.j2
    dest: /opt/nginx_conf/default.conf
    mode: "0644"

- name: Pastikan direktori html kustom ada
  file:
    path: /var/www/html
    state: directory
    mode: "0755"

- name: Buat halaman landing page kustom (index.html)
  copy:
    content: |
      <!DOCTYPE html>
      <html lang="id">
      <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Neo-Brutalist Calculator</title>
          <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;900&display=swap" rel="stylesheet">
          <style>
              * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Space Grotesk', sans-serif; }
              body { background-color: #E2E8F0; color: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
              
              .container {
                  width: 100%;
                  max-width: 900px;
                  background-color: #fff;
                  border: 6px solid #000;
                  box-shadow: 15px 15px 0px #000;
                  padding: 40px;
                  position: relative;
              }
              
              .header {
                  background-color: #FFDE00;
                  border: 4px solid #000;
                  padding: 20px;
                  margin-bottom: 30px;
                  text-align: center;
                  box-shadow: 6px 6px 0px #000;
              }
              
              .header h1 { font-size: 38px; font-weight: 900; text-transform: uppercase; letter-spacing: -1px; }
              
              .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
              @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
              
              .panel {
                  border: 4px solid #000;
                  padding: 25px;
                  box-shadow: 8px 8px 0px #000;
              }
              .panel.calc { background-color: #00E5FF; }
              .panel.history { background-color: #FF007F; color: #fff; }
              .panel h2 { font-size: 24px; font-weight: 800; border-bottom: 4px solid #000; padding-bottom: 10px; margin-bottom: 20px; text-transform: uppercase; }
              .panel.history h2 { border-color: #fff; }
              
              .input-group { margin-bottom: 15px; }
              .input-group label { display: block; font-weight: 700; margin-bottom: 5px; font-size: 14px; text-transform: uppercase; }
              .input-group input, .input-group select {
                  width: 100%;
                  padding: 12px;
                  border: 3px solid #000;
                  font-size: 16px;
                  font-weight: 700;
                  background-color: #fff;
                  color: #000;
              }
              .input-group select {
                  appearance: none;
                  background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='4' stroke-linecap='square' stroke-linejoin='miter'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
                  background-repeat: no-repeat;
                  background-position: right 15px center;
                  background-size: 18px;
                  cursor: pointer;
                  padding-right: 40px;
              }
              .input-group input:focus, .input-group select:focus { outline: none; background-color: #f0f0f0; }
              
              .btn {
                  width: 100%;
                  padding: 15px;
                  background-color: #00FF66;
                  color: #000;
                  border: 4px solid #000;
                  font-size: 20px;
                  font-weight: 800;
                  text-transform: uppercase;
                  cursor: pointer;
                  box-shadow: 5px 5px 0px #000;
                  transition: all 0.1s;
                  margin-top: 10px;
              }
              .btn:active { box-shadow: 0px 0px 0px #000; transform: translate(5px, 5px); }
              .btn.refresh { background-color: #fff; color: #000; font-size: 16px; padding: 10px; margin-bottom: 20px; }
              
              .result-box {
                  margin-top: 20px;
                  background-color: #fff;
                  border: 4px solid #000;
                  padding: 15px;
                  text-align: center;
                  font-size: 24px;
                  font-weight: 800;
                  min-height: 70px;
                  display: flex;
                  justify-content: center;
                  align-items: center;
              }
              
              .history-list {
                  background-color: #fff;
                  border: 4px solid #000;
                  height: 250px;
                  overflow-y: auto;
                  padding: 10px;
                  color: #000;
              }
              .history-item {
                  padding: 10px;
                  border-bottom: 3px dashed #000;
                  font-weight: 700;
                  font-size: 16px;
              }
              .history-item:last-child { border-bottom: none; }
              
              .badges { display: flex; gap: 10px; margin-top: 20px; justify-content: center; }
              .badge {
                  border: 2px solid #000;
                  padding: 5px 10px;
                  font-size: 12px;
                  font-weight: 800;
                  text-transform: uppercase;
                  box-shadow: 2px 2px 0px #000;
              }
              .b-nginx { background-color: #00E5FF; }
              .b-python { background-color: #FFDE00; }
              .b-hz { background-color: #FF007F; color: #fff; }
          </style>
      </head>
      <body>
          <div class="container">
              <div class="header">
                  <h1>Calculator</h1>
              </div>
              
              <div class="grid">
                  <!-- Calculator Panel -->
                  <div class="panel calc">
                      <h2>Hitung</h2>
                      <div class="input-group">
                          <label>Angka Pertama (A)</label>
                          <input type="number" id="numA" placeholder="100">
                      </div>
                      <div class="input-group">
                          <label>Operasi</label>
                          <select id="op">
                              <option value="add">Tambah (+)</option>
                              <option value="sub">Kurang (-)</option>
                              <option value="mul">Kali (*)</option>
                              <option value="div">Bagi (/)</option>
                          </select>
                      </div>
                      <div class="input-group">
                          <label>Angka Kedua (B)</label>
                          <input type="number" id="numB" placeholder="10">
                      </div>
                      <button class="btn" onclick="calculate()">Eksekusi</button>
                      
                      <div class="result-box" id="resultDisplay">
                          Hasil: -
                      </div>
                  </div>
                  
                  <!-- History Panel -->
                  <div class="panel history">
                      <h2>Riwayat Cache</h2>
                      <button class="btn refresh" onclick="fetchHistory()">Muat Ulang Riwayat</button>
                      <div class="history-list" id="historyList">
                          <div class="history-item">Memuat...</div>
                      </div>
                  </div>
              </div>
              
              <div class="badges">
                  <div class="badge b-nginx">UI by Nginx</div>
                  <div class="badge b-python">API by Python</div>
                  <div class="badge b-hz">Cache by Hazelcast</div>
              </div>
          </div>

          <script>
              // Fungsi untuk menghitung (Fetch ke API /calc via proxy Nginx)
              async function calculate() {
                  const a = document.getElementById('numA').value;
                  const b = document.getElementById('numB').value;
                  const op = document.getElementById('op').value;
                  const resultDisplay = document.getElementById('resultDisplay');
                  
                  resultDisplay.innerHTML = "Menghitung...";
                  
                  try {
                      const response = await fetch(`/api/calc?op=${op}&a=${a}&b=${b}`);
                      const data = await response.json();
                      
                      if (response.ok) {
                          resultDisplay.innerHTML = `Hasil: ${data.result}`;
                          // Otomatis refresh riwayat setelah menghitung
                          fetchHistory();
                      } else {
                          resultDisplay.innerHTML = `Error: ${data.error}`;
                      }
                  } catch (error) {
                      resultDisplay.innerHTML = "Error Koneksi API";
                  }
              }

              // Fungsi untuk mengambil riwayat (Fetch ke API /history via proxy Nginx)
              async function fetchHistory() {
                  const historyList = document.getElementById('historyList');
                  historyList.innerHTML = "<div class='history-item'>Memuat data dari Hazelcast...</div>";
                  
                  try {
                      const response = await fetch(`/api/history`);
                      const data = await response.json();
                      
                      if (response.ok && data.history) {
                          if (data.history.length === 0) {
                              historyList.innerHTML = "<div class='history-item'>Belum ada riwayat.</div>";
                          } else {
                              // Tampilkan riwayat dari yang terbaru
                              historyList.innerHTML = data.history.reverse().map(item => 
                                  `<div class="history-item">${item}</div>`
                              ).join('');
                          }
                      } else {
                          historyList.innerHTML = "<div class='history-item'>Gagal memuat riwayat.</div>";
                      }
                  } catch (error) {
                      historyList.innerHTML = "<div class='history-item'>Error Koneksi API</div>";
                  }
              }

              // Panggil fetchHistory saat halaman pertama kali dimuat
              window.onload = fetchHistory;
          </script>
      </body>
      </html>
    dest: /var/www/html/index.html
    mode: "0644"

- name: Buat Docker Network app-net
  docker_network:
    name: app-net
    state: present

- name: Jalankan Container Nginx
  docker_container:
    name: webserver
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - "/opt/nginx_conf/default.conf:/etc/nginx/conf.d/default.conf:ro"
      - "/var/www/html:/usr/share/nginx/html"
    networks:
      - name: app-net
    state: started
    recreate: yes
    restart: yes
    restart_policy: always
