---
- name: Setup dan Konfigurasi Web Servers
  hosts: webservers
  become: yes
  roles:
    - common
  tasks:
    - name: Pastikan direktori html kustom ada
      file:
        path: /var/www/html
        state: directory
        mode: '0755'

    - name: Buat halaman landing page kustom (index.html)
      copy:
        content: |
          <!DOCTYPE html>
          <html lang="id">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>{{ app_name }} - Dark Neo-Brutalist Console</title>
              <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
              <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
              <style>
                  * { box-sizing: border-box; margin: 0; padding: 0; }
                  body {
                      font-family: 'Space Grotesk', sans-serif;
                      background-color: #0b0f17;
                      color: #ffffff;
                      min-height: 100vh;
                      display: flex;
                      justify-content: center;
                      align-items: center;
                      padding: 30px;
                  }
                  .dashboard {
                      width: 100%;
                      max-width: 1050px;
                      border: 4px solid #000000;
                      background-color: #121824;
                      padding: 40px;
                      box-shadow: 12px 12px 0px #000000;
                      position: relative;
                  }
                  .header {
                      border: 4px solid #000000;
                      background-color: #1e293b;
                      padding: 25px;
                      margin-bottom: 40px;
                      box-shadow: 6px 6px 0px #ffe600;
                      display: flex;
                      justify-content: space-between;
                      align-items: center;
                      flex-wrap: wrap;
                      gap: 15px;
                  }
                  .logo-area h1 {
                      font-size: 32px;
                      font-weight: 700;
                      text-transform: uppercase;
                      letter-spacing: -1px;
                      color: #ffe600;
                  }
                  .logo-area p {
                      font-size: 14px;
                      font-weight: 600;
                      margin-top: 5px;
                      text-transform: uppercase;
                      color: #94a3b8;
                  }
                  .status-badge {
                      display: flex;
                      align-items: center;
                      gap: 10px;
                      background-color: #00ff66;
                      color: #000000;
                      border: 3px solid #000000;
                      padding: 8px 16px;
                      font-weight: 700;
                      text-transform: uppercase;
                      box-shadow: 4px 4px 0px #000000;
                  }
                  .pulse-dot {
                      width: 10px;
                      height: 10px;
                      background: #000000;
                      border-radius: 50%;
                      animation: pulse 1s infinite alternate;
                  }
                  @keyframes pulse {
                      0% { transform: scale(0.8); }
                      100% { transform: scale(1.2); }
                  }
                  .grid {
                      display: grid;
                      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                      gap: 30px;
                      margin-bottom: 40px;
                  }
                  .card {
                      border: 4px solid #000000;
                      background-color: #1e293b;
                      padding: 25px;
                      transition: all 0.2s ease;
                      position: relative;
                  }
                  .card.web { box-shadow: 8px 8px 0px #00e5ff; }
                  .card.db { box-shadow: 8px 8px 0px #e0aaff; }
                  .card.cache { box-shadow: 8px 8px 0px #ff9e00; }
                  
                  .card:hover {
                      transform: translate(-4px, -4px);
                  }
                  .card.web:hover { box-shadow: 12px 12px 0px #00e5ff; }
                  .card.db:hover { box-shadow: 12px 12px 0px #e0aaff; }
                  .card.cache:hover { box-shadow: 12px 12px 0px #ff9e00; }
                  
                  .card-header {
                      display: flex;
                      justify-content: space-between;
                      align-items: center;
                      margin-bottom: 20px;
                  }
                  .card-icon {
                      width: 50px;
                      height: 50px;
                      border: 3px solid #000000;
                      background-color: #ffffff;
                      display: flex;
                      justify-content: center;
                      align-items: center;
                      font-size: 24px;
                      box-shadow: 3px 3px 0px #000000;
                  }
                  .web .card-icon { color: #008080; }
                  .db .card-icon { color: #4b0082; }
                  .cache .card-icon { color: #8b4513; }
                  
                  .server-status {
                      font-size: 12px;
                      font-weight: 700;
                      text-transform: uppercase;
                      border: 2px solid #000000;
                      background-color: #00ff66;
                      color: #000000;
                      padding: 4px 10px;
                      box-shadow: 2px 2px 0px #000000;
                  }
                  .card-title h3 {
                      font-size: 24px;
                      font-weight: 700;
                      text-transform: uppercase;
                      letter-spacing: -0.5px;
                      color: #ffffff;
                  }
                  .card-title p {
                      font-size: 13px;
                      font-weight: 600;
                      color: #94a3b8;
                      text-transform: uppercase;
                      margin-top: 2px;
                  }
                  .specs-list {
                      margin-top: 20px;
                      border-top: 3px dashed #000000;
                      padding-top: 15px;
                  }
                  .spec-item {
                      display: flex;
                      justify-content: space-between;
                      font-size: 14px;
                      font-weight: 600;
                      margin-bottom: 8px;
                  }
                  .spec-label { color: #94a3b8; }
                  .spec-value { color: #ffffff; font-weight: 700; }
                  .footer-section {
                      border: 4px solid #000000;
                      background-color: #1e293b;
                      padding: 20px;
                      font-size: 14px;
                      font-weight: 700;
                      display: flex;
                      justify-content: space-between;
                      align-items: center;
                      box-shadow: 6px 6px 0px #ff007f;
                      flex-wrap: wrap;
                      gap: 15px;
                  }
                  .env-tag {
                      background-color: #ff007f;
                      color: #ffffff;
                      border: 2px solid #000000;
                      padding: 2px 8px;
                      text-transform: uppercase;
                      box-shadow: 2px 2px 0px #000000;
                  }
                  @media (max-width: 640px) {
                      .dashboard { padding: 20px; }
                      .logo-area h1 { font-size: 24px; }
                  }
              </style>
          </head>
          <body>
              <div class="dashboard">
                  <div class="header">
                      <div class="logo-area">
                          <h1>{{ app_name }}</h1>
                          <p>INFRASTRUCTURE CONTROL CONSOLE</p>
                      </div>
                      <div class="status-badge">
                          <div class="pulse-dot"></div>
                          SYSTEMS ACTIVE
                      </div>
                  </div>

                  <div class="grid">
                      <!-- Web Server Card -->
                      <div class="card web">
                          <div class="card-header">
                              <div class="card-icon"><i class="fa-solid fa-globe"></i></div>
                              <div class="server-status">ONLINE</div>
                          </div>
                          <div class="card-title">
                              <h3>ubuntu-1</h3>
                              <p>Web Server Node</p>
                          </div>
                          <div class="specs-list">
                              <div class="spec-item">
                                  <span class="spec-label">IP Address</span>
                                  <span class="spec-value">192.168.56.11</span>
                              </div>
                              <div class="spec-item">
                                  <span class="spec-label">Layanan</span>
                                  <span class="spec-value">Nginx Engine</span>
                              </div>
                              <div class="spec-item">
                                  <span class="spec-label">Kontainer</span>
                                  <span class="spec-value">webserver:80</span>
                              </div>
                          </div>
                      </div>

                      <!-- DB Server Card -->
                      <div class="card db">
                          <div class="card-header">
                              <div class="card-icon"><i class="fa-solid fa-database"></i></div>
                              <div class="server-status">ONLINE</div>
                          </div>
                          <div class="card-title">
                              <h3>ubuntu-2</h3>
                              <p>Database Node</p>
                          </div>
                          <div class="specs-list">
                              <div class="spec-item">
                                  <span class="spec-label">IP Address</span>
                                  <span class="spec-value">192.168.56.12</span>
                              </div>
                              <div class="spec-item">
                                  <span class="spec-label">Layanan</span>
                                  <span class="spec-value">PostgreSQL</span>
                              </div>
                              <div class="spec-item">
                                  <span class="spec-label">Kontainer</span>
                                  <span class="spec-value">dbserver:5432</span>
                              </div>
                          </div>
                      </div>

                      <!-- Cache Server Card -->
                      <div class="card cache">
                          <div class="card-header">
                              <div class="card-icon"><i class="fa-solid fa-bolt"></i></div>
                              <div class="server-status">ONLINE</div>
                          </div>
                          <div class="card-title">
                              <h3>ubuntu-3</h3>
                              <p>Cache Node</p>
                          </div>
                          <div class="specs-list">
                              <div class="spec-item">
                                  <span class="spec-label">IP Address</span>
                                  <span class="spec-value">192.168.56.13</span>
                              </div>
                              <div class="spec-item">
                                  <span class="spec-label">Layanan</span>
                                  <span class="spec-value">Redis Cache</span>
                              </div>
                              <div class="spec-item">
                                  <span class="spec-label">Kontainer</span>
                                  <span class="spec-value">cacheserver:6379</span>
                              </div>
                          </div>
                      </div>
                  </div>

                  <div class="footer-section">
                      <div>Environment: <span class="env-tag">{{ environment_name }}</span></div>
                      <div>Target Host: <strong>{{ ansible_hostname }}</strong></div>
                      <div>Admin Contact: {{ admin_email }}</div>
                  </div>
              </div>
          </body>
          </html>
        dest: /var/www/html/index.html
        mode: '0644'

    - name: Jalankan Container Nginx
      docker_container:
        name: webserver
        image: nginx:latest
        ports:
          - "80:80"
        volumes:
          - "/var/www/html:/usr/share/nginx/html"
        state: started
        restart_policy: always

