---
- name: Setup dan Konfigurasi Database Servers
  hosts: dbservers
  become: yes
  roles:
    - common
  tasks:
    - name: Pastikan direktori data PostgreSQL ada
      file:
        path: /var/lib/postgresql/data
        state: directory
        mode: '0755'

    - name: Jalankan Container PostgreSQL
      docker_container:
        name: dbserver
        image: postgres:latest
        env:
          POSTGRES_USER: vboxuser
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: mydb
        ports:
          - "5432:5432"
        volumes:
          - "/var/lib/postgresql/data:/var/lib/postgresql/data"
        state: started
        restart_policy: always

    - name: Buat direktori backup database
      file:
        path: /var/backups/postgres
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Catat log inisialisasi database server
      copy:
        content: |
          Database Server Initialized by Ansible
          Timestamp: {{ ansible_date_time.iso8601 }}
          Server: {{ ansible_hostname }}
        dest: /var/backups/postgres/init.log
        mode: '0644'
